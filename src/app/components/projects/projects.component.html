<section class="container-fluid py-5 text-white">
  <div class="row g-4">
    @for (project of projects; track project.id) {
    <div class="col-12 col-sm-6 col-md-4">
      <div class="card project-card border-0">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start mb-3">
            <div>
              <h5 class="card-title mb-1">{{ project.title }}</h5>
            </div>
            <span class="">{{ project.year }}</span>
          </div>
          <div>
            <img [src]="project.image" [alt]="project.title"/>
          </div>
          <div class="row">
            <div class="col pt-2 d-flex justify-content-around">
              <img
                class="image me-2"
                src="../../../assets/images/www2.png"
              />
              <img
                class="image me-2"
                src="../../../assets/images/github.png"
                width="10px"
              />
            </div>
          </div>
        </div>
      </div>
    </div>
    }
  </div>
</section>
